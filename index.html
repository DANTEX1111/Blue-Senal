<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blue Señal</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: black;
        }

        video {
            position: fixed;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            transform: translate(-50%, -50%);
            object-fit: cover;
            z-index: -1;
        }
    </style>
</head>
<body>

    <video autoplay muted loop playsinline preload="auto">
        <source src="blue-senal.MP4" type="video/mp4">
        Tu navegador no soporta videos.
    </video>
    
    <script>
    window.addEventListener('load', function() {
        var video = document.querySelector('video');
        var playPromise = video.play();

        if (playPromise !== undefined) {
            playPromise.then(_ => {
                // Autoplay inició correctamente
            }).catch(error => {
                // El autoplay fue bloqueado, podemos intentar reproducirlo al primer toque
                document.body.addEventListener('click', () => {
                    video.play();
                }, { once: true });
            });
        }
    });
</script>

</body>
</html>
