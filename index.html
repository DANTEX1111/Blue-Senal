<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Blue Señal</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:black;
overflow:hidden;
height:100vh;
}



#videoFondo{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-1;
}

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.2);
}

</style>

</head>

<body>

<video id="videoFondo" autoplay muted loop playsinline webkit-playsinline preload="auto">
<source src="blue-senal.MP4" type="video/mp4">
</video>

<div class="overlay"></div>

</body>

</html>
